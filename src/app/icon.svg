<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0a1628"/>
  <!-- 6-arm snowflake: 3 lines crossing at center (0°, 60°, 120°) -->
  <g stroke="#29b6f6" stroke-width="2.8" stroke-linecap="round">
    <!-- Vertical arm -->
    <line x1="16" y1="3" x2="16" y2="29"/>
    <!-- 60° arm (top-right to bottom-left) -->
    <line x1="27.3" y1="9.5" x2="4.7" y2="22.5"/>
    <!-- 120° arm (top-left to bottom-right) -->
    <line x1="4.7" y1="9.5" x2="27.3" y2="22.5"/>
  </g>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.8" fill="#29b6f6"/>
</svg>
